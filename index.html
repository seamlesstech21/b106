<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<!-- iOS 홈화면 아이콘 -->
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="B106 재고">
<!-- Android(갤럭시) 홈화면 아이콘 -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#16263d">
<link rel="icon" type="image/png" href="icon.png">
<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --navy:#16263d; --navy2:#1e3a5f; --blue:#3b82f6; --blue-soft:#e8f1fe;
    --in:#16a34a; --in-soft:#e7f6ec; --out:#e8590c; --out-soft:#fdeee3;
    --bg:#f3f5f8; --card:#ffffff; --line:#e2e7ee; --txt:#1c2430; --sub:#6b7686;
    --danger:#dc2626; --radius:14px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:'Pretendard',-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
       background:var(--bg);color:var(--txt);font-size:15px;padding-bottom:76px}

  /* 헤더 */
  header{background:var(--navy);color:#fff;padding:14px 18px;display:flex;align-items:baseline;gap:8px;
         position:sticky;top:0;z-index:50}
  header .brand{font-weight:800;letter-spacing:.12em;font-size:15px}
  header .loc{font-size:12px;color:#9db4d4}

  .wrap{padding:14px;max-width:560px;margin:0 auto}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:12px}
  .label{font-size:12px;font-weight:700;color:var(--sub);margin:14px 0 6px;display:block}
  .label:first-child{margin-top:0}
  input,select,textarea{width:100%;padding:13px;border:1.5px solid var(--line);border-radius:10px;
       font-size:15px;font-family:inherit;background:#fff;color:var(--txt)}
  input:focus,select:focus{outline:none;border-color:var(--blue)}

  /* 입고/출고 토글 */
  .seg{display:flex;gap:8px;margin-bottom:14px}
  .seg button{flex:1;padding:14px 6px;border:1.5px solid var(--line);border-radius:10px;background:#fff;
       font-size:15px;font-weight:800;color:var(--sub);font-family:inherit}
  .seg button.on-in{background:var(--in-soft);border-color:var(--in);color:var(--in)}
  .seg button.on-out{background:var(--out-soft);border-color:var(--out);color:var(--out)}
  .seg button.on-plan{background:#eef2ff;border-color:#6366f1;color:#4f46e5}
  .submit.plan{background:#4f46e5}

  /* 스캔 버튼 */
  .scan-btn{width:100%;padding:15px;border:none;border-radius:10px;background:var(--navy2);color:#fff;
       font-size:16px;font-weight:700;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px}
  .scan-btn svg{width:20px;height:20px}

  /* 선택된 품목 표시 */
  .picked{margin-top:10px;padding:12px;border-radius:10px;background:var(--blue-soft);
       border:1.5px solid var(--blue);display:none}
  .picked.show{display:block}
  .picked .pm{font-weight:800;font-size:15px}
  .picked .ps{font-size:12.5px;color:var(--sub);margin-top:3px}

  /* 수량 스테퍼 */
  .stepper{display:flex;gap:8px;align-items:stretch}
  .stepper button{width:54px;border:1.5px solid var(--line);border-radius:10px;background:#fff;
       font-size:24px;font-weight:700;color:var(--navy2);font-family:inherit}
  .stepper input{text-align:center;font-size:18px;font-weight:800}

  .submit{width:100%;padding:16px;border:none;border-radius:10px;font-size:17px;font-weight:800;
       color:#fff;font-family:inherit;margin-top:16px}
  .submit.in{background:var(--in)} .submit.out{background:var(--out)}
  .submit:disabled{opacity:.5}

  /* 최근 내역 */
  .log-row{display:flex;align-items:center;gap:10px;padding:11px 2px;border-bottom:1px solid var(--line);font-size:13.5px}
  .log-row:last-child{border-bottom:none}
  .tag{font-size:11.5px;font-weight:800;padding:3px 8px;border-radius:6px;flex-shrink:0}
  .tag.in{background:var(--in-soft);color:var(--in)} .tag.out{background:var(--out-soft);color:var(--out)}
  .log-m{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .log-q{font-weight:800} .log-s{color:var(--sub);font-size:12px;flex-shrink:0}

  /* 재고 테이블 */
  .stock-row{display:flex;align-items:center;gap:10px;padding:13px 2px;border-bottom:1px solid var(--line)}
  .stock-row:last-child{border-bottom:none}
  .stock-info{flex:1;min-width:0}
  .stock-info .m{font-weight:700;font-size:14.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .stock-info .c{font-size:12px;color:var(--sub);margin-top:2px}
  .qty-big{font-size:21px;font-weight:800;color:var(--navy2);min-width:50px;text-align:right}
  .qty-big.low{color:var(--out)} .qty-big.zero{color:var(--danger)}
  .badge{font-size:10.5px;font-weight:800;padding:2px 7px;border-radius:5px;margin-top:3px;display:inline-block}
  .badge.low{background:var(--out-soft);color:var(--out)} .badge.zero{background:#fde8e8;color:var(--danger)}
  .rsv-txt{display:block;font-size:11.5px;color:#4f46e5;font-weight:700;margin-top:3px}

  /* 입출고목록 히스토리 카드 */
  .hist-row{padding:12px 2px;border-bottom:1px solid var(--line)}
  .hist-row:last-child{border-bottom:none}
  .hist-top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
  .hist-date{font-size:13px;font-weight:700;color:#4f46e5}
  .hist-qty{margin-left:auto;font-size:15px;font-weight:800;color:var(--navy2)}
  .hist-model{font-weight:700;font-size:14.5px}
  .hist-sub{font-size:12.5px;color:var(--txt);margin-top:2px}
  .hist-sub2{font-size:11.5px;color:var(--sub);margin-top:2px}
  .hist-actions{display:flex;gap:8px;margin-top:9px}
  .hist-actions .act{flex:1;padding:9px;border-radius:8px;font-size:13px;font-weight:700;font-family:inherit;border:1.5px solid var(--line);background:#fff}
  .act.confirm{background:var(--out);color:#fff;border-color:var(--out)}
  .act.cancel{background:#fff;color:var(--sub)}

  /* 품목 목록 */
  .item-row{display:flex;align-items:center;gap:10px;padding:12px 2px;border-bottom:1px solid var(--line)}
  .item-row:last-child{border-bottom:none}
  .qr-btn{flex-shrink:0;padding:8px 12px;border:1.5px solid var(--blue);border-radius:8px;background:#fff;
       color:var(--blue);font-size:12.5px;font-weight:700;font-family:inherit}

  .sec-title{font-size:13px;font-weight:800;color:var(--navy2);margin-bottom:10px;letter-spacing:.02em}

  /* 하단 탭 */
  nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);
      display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom)}
  nav button{flex:1;padding:11px 0 9px;border:none;background:none;font-family:inherit;
      font-size:10.5px;font-weight:700;color:var(--sub);display:flex;flex-direction:column;align-items:center;gap:3px}
  nav button.on{color:var(--blue)}
  nav svg{width:21px;height:21px}

  /* 스캐너 오버레이 */
  #scanner-overlay{position:fixed;inset:0;background:#000;z-index:100;display:none;flex-direction:column}
  #scanner-overlay.show{display:flex}
  #reader{flex:1}
  .scan-close{padding:18px;background:var(--navy);color:#fff;border:none;font-size:16px;font-weight:700;font-family:inherit}
  .scan-hint{position:absolute;top:18px;left:0;right:0;text-align:center;color:#fff;font-size:14px;
      font-weight:600;text-shadow:0 1px 4px rgba(0,0,0,.6);z-index:101}

  /* QR 라벨 모달 */
  #qr-modal{position:fixed;inset:0;background:rgba(10,18,30,.65);z-index:100;display:none;
      align-items:center;justify-content:center;padding:24px}
  #qr-modal.show{display:flex}
  .qr-card{background:#fff;border-radius:16px;padding:28px 24px;text-align:center;width:100%;max-width:320px}
  #qr-box{display:flex;justify-content:center;margin:14px 0}
  .qr-model{font-weight:800;font-size:16px;word-break:break-all}
  .qr-code-txt{font-size:13px;color:var(--sub);margin-top:4px;font-family:monospace}
  .qr-actions{display:flex;gap:8px;margin-top:18px}
  .qr-actions button{flex:1;padding:13px;border-radius:10px;font-size:14.5px;font-weight:700;font-family:inherit;border:1.5px solid var(--line);background:#fff;color:var(--txt)}
  .qr-actions button.pri{background:var(--navy2);color:#fff;border-color:var(--navy2)}

  /* 토스트 */
  #toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;
      padding:13px 20px;border-radius:10px;font-size:14px;font-weight:600;z-index:200;display:none;
      max-width:90%;text-align:center;box-shadow:0 6px 20px rgba(0,0,0,.25)}

  #loading{position:fixed;inset:0;background:var(--bg);z-index:300;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:14px;color:var(--sub);font-weight:600}
  .spin{width:34px;height:34px;border:4px solid var(--line);border-top-color:var(--blue);border-radius:50%;
      animation:sp 0.8s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .hidden{display:none!important}

  @media print{
    body *{display:none!important}
    #qr-modal.show{display:flex!important;background:#fff;position:static}
    #qr-modal.show .qr-card, #qr-modal.show .qr-card *{display:block!important}
    .qr-actions{display:none!important}
    #qr-box{display:flex!important}
    #qr-box img{display:block!important;margin:0 auto}
  }
</style>
</head>
<body>

<div id="loading"><div class="spin"></div>데이터 불러오는 중…</div>

<header><span class="brand">SEAMLESS</span><span class="loc">B106 창고 재고관리</span></header>

<!-- ───────── 탭 1: 입출고 ───────── -->
<div class="wrap" id="view-io">
  <div class="card">
    <div class="seg">
      <button id="btn-in" class="on-in" onclick="setMode('입고')">📥 입고</button>
      <button id="btn-out" onclick="setMode('출고')">📤 출고</button>
      <button id="btn-plan" onclick="setMode('예약')">📅 예약</button>
    </div>

    <button class="scan-btn" onclick="openScanner('io')">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2M7 12h10"/></svg>
      바코드 촬영 스캔
    </button>

    <span class="label">품목 직접 선택 (바코드 없는 경우)</span>
    <select id="item-select" onchange="pickFromSelect()"><option value="">— 품목 선택 —</option></select>

    <div class="picked" id="picked">
      <div class="pm" id="picked-model"></div>
      <div class="ps" id="picked-stock"></div>
    </div>

    <span class="label">수량</span>
    <div class="stepper">
      <button onclick="stepQty(-1)">−</button>
      <input type="number" id="qty" value="1" min="1" inputmode="numeric">
      <button onclick="stepQty(1)">＋</button>
    </div>

    <span class="label">담당자</span>
    <select id="staff"><option value="">— 선택 —</option></select>

    <div id="reason-wrap">
      <span class="label" id="reason-label">사유</span>
      <select id="reason"></select>
    </div>

    <div id="plan-date-wrap" style="display:none">
      <span class="label">출고 예정일자</span>
      <input type="date" id="plan-date">
    </div>

    <div id="site-wrap">
      <span class="label">현장명 / 거래처</span>
      <input type="text" id="site" placeholder="예: OO빌딩 3층 회의실">
    </div>

    <span class="label">비고 (선택)</span>
    <input type="text" id="note" placeholder="시리얼번호, 특이사항 등">

    <button class="submit in" id="submit-btn" onclick="submitLog(false)">입고 저장</button>
  </div>
</div>

<!-- ───────── 탭: 입출고목록 ───────── -->
<div class="wrap hidden" id="view-list">
  <div class="card">
    <div class="seg">
      <button id="lbtn-in" class="on-in" onclick="setListMode('입고')">입고</button>
      <button id="lbtn-out" onclick="setListMode('출고')">출고</button>
      <button id="lbtn-plan" onclick="setListMode('예약')">예약</button>
    </div>
    <div id="list-body"></div>
  </div>
</div>

<!-- ───────── 탭: 재고 현황 ───────── -->
<div class="wrap hidden" id="view-stock">
  <div class="card">
    <input type="text" id="stock-search" placeholder="모델명 검색" oninput="renderStock()">
    <div style="display:flex;gap:8px;margin-top:10px">
      <select id="stock-filter" onchange="renderStock()" style="flex:1">
        <option value="">전체 분류</option>
      </select>
      <select id="stock-sort" onchange="renderStock()" style="flex:1">
        <option value="name">이름순</option>
        <option value="category">분류순</option>
        <option value="low">재고 적은순</option>
      </select>
    </div>
  </div>
  <div class="card" id="stock-list"></div>
</div>

<!-- ───────── 탭 3: 품목 · 라벨 ───────── -->
<div class="wrap hidden" id="view-items">
  <div class="card">
    <div class="sec-title">신규 품목 등록</div>
    <span class="label">바코드 (없으면 비워두세요 → 자동 발급)</span>
    <div style="display:flex;gap:8px">
      <input type="text" id="new-barcode" placeholder="스캔 또는 직접 입력">
      <button class="qr-btn" style="flex-shrink:0" onclick="openScanner('register')">스캔</button>
    </div>
    <span class="label">모델명 *</span>
    <input type="text" id="new-model" placeholder="예: LH55QMCEBGCXKR">
    <span class="label">분류</span>
    <select id="new-category"></select>
    <span class="label">규격 / 비고</span>
    <input type="text" id="new-spec" placeholder="예: 55인치, 벽걸이형">
    <span class="label">안전재고 (이 수량 미만이면 경고 표시)</span>
    <input type="number" id="new-safety" value="0" inputmode="numeric">
    <button class="submit" style="background:var(--navy2)" onclick="submitItem()">품목 등록</button>
  </div>

  <div class="card">
    <div class="sec-title">등록 품목 · QR 라벨 출력</div>
    <div style="font-size:12.5px;color:var(--sub);margin-bottom:8px">바코드 없는 품목은 QR 라벨을 출력해 박스에 부착하세요.</div>
    <div id="item-list"></div>
  </div>
</div>

<!-- 하단 탭바 -->
<nav>
  <button id="tab-io" class="on" onclick="switchTab('io')">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 3h5v5M21 3l-7 7M8 21H3v-5M3 21l7-7"/></svg>
    입출고</button>
  <button id="tab-list" onclick="switchTab('list')">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
    입출고목록</button>
  <button id="tab-stock" onclick="switchTab('stock')">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 7l-8-4-8 4v10l8 4 8-4V7zM4 7l8 4 8-4M12 11v10"/></svg>
    재고 현황</button>
  <button id="tab-items" onclick="switchTab('items')">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h3v3h-3zM18 18h3v3h-3z"/></svg>
    품목·라벨</button>
</nav>

<!-- 스캐너: 폰 카메라로 촬영 → ZXing으로 이미지에서 바코드 인식 (iframe 카메라 제약 회피) -->
<input type="file" id="scan-file" accept="image/*" capture="environment" style="display:none" onchange="onScanFile(event)">

<!-- QR 라벨 모달 -->
<div id="qr-modal" onclick="if(event.target===this)closeQr()">
  <div class="qr-card">
    <div class="qr-model" id="qr-model"></div>
    <div id="qr-box"></div>
    <div class="qr-code-txt" id="qr-code-txt"></div>
    <div class="qr-actions">
      <button onclick="closeQr()">닫기</button>
      <button class="pri" onclick="window.print()">라벨 인쇄</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ───────── 상태 ───────── */
let DB = { items: [], staff: [], inReasons: [], outReasons: [], categories: [], stock: {}, reserved: {}, logs: [], inLogs: [], outLogs: [], plans: [] };
let mode = '입고';
let picked = null;          // 선택된 품목
let scanContext = 'io';     // 'io' = 입출고용 스캔, 'register' = 품목등록용 스캔

/* ═══════════════════════════════════════════════════════════
   ⚙️ 여기에 Apps Script 웹앱 URL(.../exec)을 붙여넣으세요
   ═══════════════════════════════════════════════════════════ */
const API_URL = "https://script.google.com/macros/s/AKfycbzg6I1ouon-ASeq5u1Rzle_XG7tdID9vbGoUcyVfB_x5VDDdxoRgsTr73Z6Yw_PaX8_zw/exec";

/* ───────── API 호출 헬퍼 ───────── */
async function apiGet(){
  const res = await fetch(API_URL + '?action=init');
  return await res.json();
}
async function apiPost(payload){
  // text/plain → CORS 프리플라이트 회피 (Apps Script 호환)
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  });
  return await res.json();
}

/* ───────── 초기 로드 ───────── */
apiGet().then(d => {
  DB = d;
  buildSelects();
  renderStock(); renderItems(); renderList();
  document.getElementById('loading').classList.add('hidden');
}).catch(e => {
  document.getElementById('loading').innerHTML =
    '로드 실패: ' + e.message + '<br>API_URL 설정과 인터넷 연결을 확인하세요.';
});

function buildSelects(){
  const is = document.getElementById('item-select');
  is.innerHTML = '<option value="">— 품목 선택 —</option>';
  const cats = [...new Set(DB.items.map(i=>i.category))];
  cats.forEach(c=>{
    const og = document.createElement('optgroup'); og.label = c;
    DB.items.filter(i=>i.category===c).forEach(i=>{
      const o = document.createElement('option');
      o.value = i.barcode; o.textContent = i.model;
      og.appendChild(o);
    });
    is.appendChild(og);
  });
  const st = document.getElementById('staff');
  st.innerHTML = '<option value="">— 선택 —</option>' + DB.staff.map(s=>`<option>${s}</option>`).join('');

  // 분류 드롭다운 (설정 시트 기반)
  const catList = (DB.categories && DB.categories.length) ? DB.categories : ['사이니지','브라켓','모니터','기타'];
  document.getElementById('new-category').innerHTML = catList.map(c=>`<option>${c}</option>`).join('');

  // 재고현황 필터(분류) 옵션
  const sf = document.getElementById('stock-filter');
  if(sf) sf.innerHTML = '<option value="">전체 분류</option>' + catList.map(c=>`<option>${c}</option>`).join('');

  fillReasons();
}

function fillReasons(){
  if(mode==='예약'){ return; }  // 예약은 사유 대신 예정일자 사용
  const rs = mode==='입고' ? DB.inReasons : DB.outReasons;
  document.getElementById('reason').innerHTML = rs.map(r=>`<option>${r}</option>`).join('');
}

/* ───────── 입고/출고/예약 모드 ───────── */
function setMode(m){
  mode = m;
  document.getElementById('btn-in').className   = m==='입고' ? 'on-in' : '';
  document.getElementById('btn-out').className  = m==='출고' ? 'on-out' : '';
  document.getElementById('btn-plan').className = m==='예약' ? 'on-plan' : '';

  const sb = document.getElementById('submit-btn');
  sb.textContent = (m==='예약' ? '예약 등록' : m + ' 저장');
  sb.className = 'submit ' + (m==='입고' ? 'in' : m==='출고' ? 'out' : 'plan');

  // 현장명: 출고·예약에서 표시
  document.getElementById('site-wrap').style.display = (m==='출고' || m==='예약') ? 'block' : 'none';
  // 사유: 입고·출고에서만 / 예정일자: 예약에서만
  document.getElementById('reason-wrap').style.display    = (m==='예약') ? 'none' : 'block';
  document.getElementById('plan-date-wrap').style.display = (m==='예약') ? 'block' : 'none';

  fillReasons();
  showPicked();
}
setMode('입고');

/* ───────── 품목 선택 ───────── */
function pickFromSelect(){
  const bc = document.getElementById('item-select').value;
  picked = DB.items.find(i=>i.barcode===bc) || null;
  showPicked();
}

function pickByBarcode(bc){
  const item = DB.items.find(i=>i.barcode===bc);
  if(item){
    picked = item;
    document.getElementById('item-select').value = bc;
    showPicked();
    toast('✓ ' + item.model);
    if(navigator.vibrate) navigator.vibrate(80);
  } else {
    if(confirm('등록되지 않은 바코드입니다.\n[' + bc + ']\n\n신규 품목으로 등록할까요?')){
      switchTab('items');
      document.getElementById('new-barcode').value = bc;
      document.getElementById('new-model').focus();
    }
  }
}

function showPicked(){
  const p = document.getElementById('picked');
  if(!picked){ p.classList.remove('show'); return; }
  p.classList.add('show');
  document.getElementById('picked-model').textContent = picked.model;
  const q = DB.stock[picked.barcode] || 0;
  const rsv = (DB.reserved && DB.reserved[picked.barcode]) || 0;
  const avail = q - rsv;
  let stockTxt = picked.category + ' · 실재고 ' + q + '개';
  if(rsv > 0) stockTxt += ' · 예약 ' + rsv + ' · 가용 ' + avail;
  if(picked.spec) stockTxt += ' · ' + picked.spec;
  document.getElementById('picked-stock').textContent = stockTxt;
}

function stepQty(d){
  const q = document.getElementById('qty');
  q.value = Math.max(1, (parseInt(q.value)||1) + d);
}

/* ───────── 입출고/예약 저장 ───────── */
function submitLog(force){
  if(!picked){ toast('품목을 먼저 스캔하거나 선택해주세요'); return; }
  const qty = parseInt(document.getElementById('qty').value)||0;
  const staff = document.getElementById('staff').value;
  const btn = document.getElementById('submit-btn');

  // ── 예약(출고예정) ──
  if(mode==='예약'){
    const plan = {
      barcode: picked.barcode,
      model: picked.model,
      qty: qty,
      staff: staff,
      date: document.getElementById('plan-date').value,
      site: document.getElementById('site').value
    };
    if(!plan.date){ toast('예정일자를 입력해주세요'); return; }
    btn.disabled = true; btn.textContent = '등록 중…';
    apiPost({ action:'addPlan', plan: plan }).then(res=>{
      btn.disabled = false; btn.textContent = '예약 등록';
      if(res.ok){
        DB.reserved = res.reserved; DB.plans = res.plans;
        renderStock(); showPicked();
        toast('✅ ' + res.msg);
        document.getElementById('qty').value = 1;
        document.getElementById('site').value = '';
        if(navigator.vibrate) navigator.vibrate([60,40,60]);
      } else toast('⚠️ ' + res.msg);
    }).catch(e=>{ btn.disabled=false; btn.textContent='예약 등록'; toast('등록 실패: '+e.message); });
    return;
  }

  // ── 입고/출고 ──
  const entry = {
    type: mode,
    barcode: picked.barcode,
    model: picked.model,
    qty: qty,
    staff: staff,
    site: (mode==='출고' ? document.getElementById('site').value : '') ||
          document.getElementById('reason').value,
    note: document.getElementById('note').value,
    force: force
  };
  if(mode==='출고' && document.getElementById('site').value){
    entry.site = document.getElementById('reason').value + ' / ' + document.getElementById('site').value;
  }
  btn.disabled = true; btn.textContent = '저장 중…';

  apiPost({ action:'save', entry: entry }).then(res=>{
    btn.disabled = false; btn.textContent = mode + ' 저장';
    if(res.ok){
      DB.stock = res.stock; DB.logs = res.logs;
      reloadData();
      renderStock(); showPicked();
      toast('✅ ' + res.msg);
      document.getElementById('qty').value = 1;
      document.getElementById('note').value = '';
      if(navigator.vibrate) navigator.vibrate([60,40,60]);
    } else if(res.warn){
      if(confirm('⚠️ ' + res.msg)) submitLog(true);
    } else {
      toast('⚠️ ' + res.msg);
    }
  }).catch(e=>{
    btn.disabled = false; btn.textContent = mode + ' 저장';
    toast('저장 실패: ' + e.message);
  });
}

/* 입출고목록 최신화를 위해 전체 데이터 재조회 */
function reloadData(){
  apiGet().then(d=>{ DB = d; renderList(); renderStock(); }).catch(()=>{});
}

/* ───────── 신규 품목 등록 ───────── */
function submitItem(){
  const item = {
    barcode: document.getElementById('new-barcode').value,
    model: document.getElementById('new-model').value.trim(),
    category: document.getElementById('new-category').value,
    spec: document.getElementById('new-spec').value,
    safety: document.getElementById('new-safety').value
  };
  if(!item.model){ toast('모델명을 입력해주세요'); return; }
  apiPost({ action:'addItem', item: item }).then(res=>{
    if(res.ok){
      DB.items = res.items;
      buildSelects(); renderItems(); renderStock();
      toast('✅ 등록 완료 — 코드: ' + res.barcode);
      ['new-barcode','new-model','new-spec'].forEach(id=>document.getElementById(id).value='');
      document.getElementById('new-safety').value = 0;
    } else toast('⚠️ ' + res.msg);
  }).catch(e=>toast('등록 실패: ' + e.message));
}

/* ───────── 렌더링 ───────── */

/* 입출고목록 탭: 입고/출고/예약 토글 */
let listMode = '입고';
function setListMode(m){
  listMode = m;
  document.getElementById('lbtn-in').className   = m==='입고' ? 'on-in' : '';
  document.getElementById('lbtn-out').className  = m==='출고' ? 'on-out' : '';
  document.getElementById('lbtn-plan').className = m==='예약' ? 'on-plan' : '';
  renderList();
}

function renderList(){
  const el = document.getElementById('list-body');
  if(!el) return;

  if(listMode==='예약'){
    const plans = DB.plans || [];
    if(!plans.length){ el.innerHTML = emptyMsg_('예약된 출고예정이 없습니다'); return; }
    el.innerHTML = plans.map(p=>`
      <div class="hist-row">
        <div class="hist-top">
          <span class="hist-date">📅 ${p.date}</span>
          <span class="hist-qty">${p.qty}개</span>
        </div>
        <div class="hist-model">${p.model}</div>
        <div class="hist-sub">${p.site || '-'} · ${p.staff}</div>
        <div class="hist-actions">
          <button class="act confirm" onclick="confirmPlan('${p.id}', false)">출고확정</button>
          <button class="act cancel" onclick="cancelPlan('${p.id}')">취소</button>
        </div>
      </div>`).join('');
    return;
  }

  // 입고/출고 내역
  const logs = listMode==='입고' ? (DB.inLogs||[]) : (DB.outLogs||[]);
  if(!logs.length){ el.innerHTML = emptyMsg_((listMode)+' 내역이 없습니다'); return; }
  el.innerHTML = logs.map(l=>`
    <div class="hist-row">
      <div class="hist-top">
        <span class="tag ${listMode==='입고'?'in':'out'}">${listMode}</span>
        <span class="hist-qty">${l.qty}개</span>
      </div>
      <div class="hist-model">${l.model}</div>
      <div class="hist-sub">${l.site || '-'}</div>
      <div class="hist-sub2">${l.staff} · ${l.time}${l.note?' · '+l.note:''}</div>
    </div>`).join('');
}

function emptyMsg_(t){ return '<div style="color:var(--sub);font-size:13px;padding:8px 2px">'+t+'</div>'; }

/* 예약 출고확정 */
function confirmPlan(id, force){
  if(!force && !confirm('이 예약을 실제 출고로 확정할까요?\n(실재고가 차감됩니다)')) return;
  apiPost({ action:'confirmPlan', id:id, force:force }).then(res=>{
    if(res.ok){
      DB.stock=res.stock; DB.reserved=res.reserved; DB.plans=res.plans; DB.outLogs=res.outLogs;
      renderList(); renderStock();
      toast('✅ ' + res.msg);
    } else if(res.warn){
      if(confirm('⚠️ ' + res.msg)) confirmPlan(id, true);
    } else toast('⚠️ ' + res.msg);
  }).catch(e=>toast('확정 실패: '+e.message));
}

/* 예약 취소 */
function cancelPlan(id){
  if(!confirm('이 예약을 취소할까요?')) return;
  apiPost({ action:'cancelPlan', id:id }).then(res=>{
    if(res.ok){
      DB.reserved=res.reserved; DB.plans=res.plans;
      renderList(); renderStock();
      toast('예약이 취소되었습니다');
    } else toast('⚠️ ' + res.msg);
  }).catch(e=>toast('취소 실패: '+e.message));
}

function renderStock(){
  const kw = (document.getElementById('stock-search').value||'').toLowerCase();
  const filterCat = document.getElementById('stock-filter') ? document.getElementById('stock-filter').value : '';
  const sortBy = document.getElementById('stock-sort') ? document.getElementById('stock-sort').value : 'name';
  const el = document.getElementById('stock-list');

  let rows = DB.items.filter(i =>
    (!kw || i.model.toLowerCase().includes(kw)) &&
    (!filterCat || i.category === filterCat)
  );

  // 정렬
  rows = rows.slice().sort((a,b)=>{
    if(sortBy==='category'){
      if(a.category!==b.category) return a.category < b.category ? -1 : 1;
      return a.model < b.model ? -1 : 1;
    }
    if(sortBy==='low'){
      const qa=(DB.stock[a.barcode]||0), qb=(DB.stock[b.barcode]||0);
      return qa - qb;
    }
    return a.model < b.model ? -1 : a.model > b.model ? 1 : 0; // 이름순
  });

  if(!rows.length){ el.innerHTML = '<div style="color:var(--sub);font-size:13px">품목 없음</div>'; return; }
  el.innerHTML = rows.map(i=>{
    const q = DB.stock[i.barcode]||0;
    const rsv = (DB.reserved && DB.reserved[i.barcode]) || 0;
    const avail = q - rsv;
    const cls = q<=0 ? 'zero' : (q < i.safety ? 'low' : '');
    const badge = q<=0 ? '<span class="badge zero">재고없음</span>' :
                  (q < i.safety ? '<span class="badge low">안전재고 미만</span>' : '');
    const rsvTxt = rsv>0 ? `<span class="rsv-txt">예약 ${rsv} · 가용 ${avail}</span>` : '';
    return `<div class="stock-row">
      <div class="stock-info"><div class="m">${i.model}</div><div class="c">${i.category}${i.spec?' · '+i.spec:''}</div>${badge}${rsvTxt}</div>
      <div class="qty-big ${cls}">${q}</div>
    </div>`;
  }).join('');
}

function renderItems(){
  const el = document.getElementById('item-list');
  if(!DB.items.length){ el.innerHTML = '<div style="color:var(--sub);font-size:13px">품목 없음</div>'; return; }
  el.innerHTML = DB.items.map((i,idx)=>`
    <div class="item-row">
      <div class="stock-info"><div class="m">${i.model}</div><div class="c">${i.barcode} · ${i.category}</div></div>
      <button class="qr-btn" onclick="showQr(${idx})">QR 라벨</button>
    </div>`).join('');
}

/* ───────── QR 라벨 ───────── */
function showQr(idx){
  const i = DB.items[idx];
  document.getElementById('qr-model').textContent = i.model;
  document.getElementById('qr-code-txt').textContent = i.barcode;
  const box = document.getElementById('qr-box');
  box.innerHTML = '';
  new QRCode(box, { text: i.barcode, width: 180, height: 180 });
  document.getElementById('qr-modal').classList.add('show');
}
function closeQr(){ document.getElementById('qr-modal').classList.remove('show'); }

/* ───────── 스캐너: 폰 카메라 촬영 → ZXing으로 이미지 디코딩 ───────── */
function openScanner(ctx){
  scanContext = ctx;
  document.getElementById('scan-file').value = '';   // 같은 사진 재선택 허용
  document.getElementById('scan-file').click();       // 폰 카메라 앱 실행
}

function onScanFile(ev){
  const file = ev.target.files && ev.target.files[0];
  if(!file) return;
  toast('바코드 인식 중…');

  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = function(){
    try {
      // 해상도 보정: 너무 크면 인식률 저하 → 가로 1600px 기준으로 리사이즈
      const maxW = 1600;
      const scale = img.width > maxW ? maxW / img.width : 1;
      const cv = document.createElement('canvas');
      cv.width = img.width * scale;
      cv.height = img.height * scale;
      cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);

      const hints = new Map();
      const ZX = ZXing;
      // EAN-13(삼성 박스), CODE-128, QR 등 주요 포맷 모두 시도
      hints.set(ZX.DecodeHintType.POSSIBLE_FORMATS, [
        ZX.BarcodeFormat.EAN_13, ZX.BarcodeFormat.EAN_8,
        ZX.BarcodeFormat.CODE_128, ZX.BarcodeFormat.CODE_39,
        ZX.BarcodeFormat.UPC_A, ZX.BarcodeFormat.QR_CODE
      ]);
      hints.set(ZX.DecodeHintType.TRY_HARDER, true);

      const reader = new ZX.BrowserMultiFormatReader(hints);
      reader.decodeFromImageUrl(cv.toDataURL('image/png'))
        .then(result => { handleScanResult(result.getText()); })
        .catch(() => { toast('⚠️ 바코드를 못 읽었어요. 바코드가 화면에 꽉 차게, 밝게 다시 찍어주세요'); })
        .finally(() => URL.revokeObjectURL(url));
    } catch(e){
      toast('⚠️ 인식 오류 — 다시 시도해주세요');
      URL.revokeObjectURL(url);
    }
  };
  img.onerror = function(){ toast('⚠️ 이미지를 불러오지 못했어요'); URL.revokeObjectURL(url); };
  img.src = url;
}

function handleScanResult(txt){
  const code = String(txt).trim();
  if(scanContext === 'register'){
    document.getElementById('new-barcode').value = code;
    toast('바코드 입력됨: ' + code);
  } else {
    pickByBarcode(code);
  }
}

/* ───────── 탭 전환 ───────── */
function switchTab(t){
  ['io','list','stock','items'].forEach(v=>{
    document.getElementById('view-'+v).classList.toggle('hidden', v!==t);
    document.getElementById('tab-'+v).classList.toggle('on', v===t);
  });
  if(t==='list') renderList();
  if(t==='stock') renderStock();
}

/* ───────── 토스트 ───────── */
let toastTimer = null;
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.style.display='none', 2600);
}
</script>
